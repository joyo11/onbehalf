<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Onbehalf</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <header>
      <div class="logo">O</div>
      <h1>Onbehalf</h1>
    </header>

    <main id="state-loading" class="hidden">
      <p class="muted">Loading…</p>
    </main>

    <main id="state-signed-out" class="hidden">
      <p>Sign in on the web to connect this extension.</p>
      <button id="open-sign-in" class="primary">Open Onbehalf</button>
    </main>

    <main id="state-no-match" class="hidden">
      <div class="account">
        <p class="muted">Signed in as</p>
        <p id="no-match-email"></p>
      </div>
      <p class="muted">Current tab</p>
      <p id="no-match-status">—</p>
      <button id="open-dashboard-2" class="primary">Open dashboard</button>
    </main>

    <main id="state-ready-to-fill" class="hidden">
      <div class="account">
        <p class="muted">Queued application</p>
        <p id="ready-job-title"></p>
        <p id="ready-job-company" class="muted"></p>
      </div>
      <button id="run-fill" class="primary">Fill this form</button>
    </main>

    <main id="state-filled" class="hidden">
      <p class="muted">Filled</p>
      <ul id="filled-list"></ul>
      <p class="muted" id="skipped-line"></p>
      <button id="approve-submit" class="primary">Approve & Submit</button>
      <button id="cancel-fill" class="secondary">Don't submit</button>
    </main>

    <main id="state-error" class="hidden">
      <p id="error-text"></p>
      <button id="retry" class="secondary">Try again</button>
    </main>

    <footer>
      <span class="muted">v0.1.0</span>
    </footer>

    <script src="popup.js"></script>
  </body>
</html>
